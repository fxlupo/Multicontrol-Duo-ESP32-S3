; Bewässerungssteuerung v2.2.22 – ESP32-S3-DevKitC-1 N16R8
[platformio]
default_envs                    = esp32s3

[env:esp32s3]
platform                        = espressif32
board                           = esp32-s3-devkitc-1-n16r8
framework                       = arduino

board_build.partitions          = partitions.csv

upload_port                     = /dev/tty.wchusbserial58881023701
monitor_port                    = /dev/tty.wchusbserial58881023701
monitor_speed                   = 115200
monitor_filters                 = esp32_exception_decoder, default
upload_speed                    = 921600

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8
    https://github.com/hafidhh/Callmebot-ESP32.git#v2.0.0
    https://github.com/plageoj/urlencode.git#v1.0.1

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DUSE_HSPI_PORT
    ; TFT_eSPI – alle Pin-Defines via build_flags, kein User_Setup.h nötig
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_MOSI=38
    -DTFT_MISO=39
    -DTFT_SCLK=40
    -DTFT_CS=41
    -DTFT_DC=42
    -DTFT_RST=21
    -DTFT_BL=47
    -DTFT_BACKLIGHT_ON=HIGH
    -DTOUCH_CS=8
    -DSPI_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

[env:esp32s3_ota]
extends                         = env:esp32s3
upload_protocol                 = espota
upload_port                     = bewaesserung-esp32.local
upload_flags                    =
    --auth=bewaesserung

[env:esp32s3_relay_diag]
extends                         = env:esp32s3
build_flags =
    ${env:esp32s3.build_flags}
    -DRELAY_DIAG_ONLY=1
